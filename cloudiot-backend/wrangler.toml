name = "cloudiot-backend"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "cloudiot-db"
database_id = "your-database-id"

# KV 命名空间绑定
[[kv_namespaces]]
binding = "CACHE"
id = "your-kv-id"

# R2 存储桶绑定
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "cloudiot-files"

# Durable Objects 类
[[durable_objects.bindings]]
name = "DEVICE_SESSION"
class_name = "DeviceSession"

[[durable_objects.bindings]]
name = "SCENE_EXECUTOR"
class_name = "SceneExecutor"

[[durable_objects.bindings]]
name = "NOTIFICATION_HUB"
class_name = "NotificationHub"

[[durable_objects.bindings]]
name = "REALTIME_HUB"
class_name = "RealtimeHub"

# 环境变量
[vars]
ENVIRONMENT = "production"

# 开发环境覆盖
[env.development]
name = "cloudiot-backend-dev"
compatibility_flags = ["nodejs_compat"]

[[env.development.d1_databases]]
binding = "DB"
database_name = "cloudiot-db"
database_id = "dev-database-id"

[[env.development.kv_namespaces]]
binding = "CACHE"
id = "dev-cache-id"
