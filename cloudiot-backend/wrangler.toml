name = "cloudiot-backend"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "cloudiot-db"
database_id = "4523ac5f-0634-4f31-a276-55eb47c3e140"

# KV 命名空间绑定
[[kv_namespaces]]
binding = "CACHE"
id = "your-kv-id"

# R2 存储桶绑定
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "cloudiot-files"

# Durable Objects
[[durable_objects.bindings]]
name = "DEVICE_SESSION"
class_name = "DeviceSession"

[[durable_objects.bindings]]
name = "SCENE_EXECUTOR"
class_name = "SceneExecutor"

[[durable_objects.bindings]]
name = "NOTIFICATION_HUB"
class_name = "NotificationHub"

[[durable_objects.bindings]]
name = "REALTIME_HUB"
class_name = "RealtimeHub"

# Durable Objects 迁移
[[migrations]]
tag = "v1"
new_sqlite_classes = [ "DeviceSession", "SceneExecutor", "NotificationHub", "RealtimeHub" ]

# 环境变量
[vars]
ENVIRONMENT = "production"
